<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Impostor game preview</title>
  <desc id="desc">A cinematic board showing actor tiles with one highlighted answer.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#081427"/>
      <stop offset="55%" stop-color="#1a2448"/>
      <stop offset="100%" stop-color="#472118"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#11203d"/>
      <stop offset="100%" stop-color="#1f2d4f"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect x="120" y="110" width="1360" height="680" rx="40" fill="#0a1328" fill-opacity="0.72" stroke="#61dfff" stroke-opacity="0.26"/>
  <text x="180" y="220" fill="#2bd6ea" font-family="Arial, sans-serif" font-size="46" font-weight="700" letter-spacing="4">IMPOSTOR</text>
  <text x="180" y="280" fill="#ffffff" font-family="Arial, sans-serif" font-size="66" font-weight="700">Which actor appears in "Ghost"?</text>
  <g transform="translate(180 340)">
    <rect width="380" height="140" rx="18" fill="url(#card)" stroke="#7ea0d2" stroke-opacity="0.35"/>
    <text x="190" y="85" fill="#f2f6ff" text-anchor="middle" font-family="Arial, sans-serif" font-size="42" font-weight="700">Demi Moore</text>
  </g>
  <g transform="translate(610 340)">
    <rect width="380" height="140" rx="18" fill="url(#card)" stroke="#7ea0d2" stroke-opacity="0.35"/>
    <text x="190" y="85" fill="#f2f6ff" text-anchor="middle" font-family="Arial, sans-serif" font-size="42" font-weight="700">Brad Pitt</text>
  </g>
  <g transform="translate(1040 340)">
    <rect width="380" height="140" rx="18" fill="#204938" stroke="#35d07f" stroke-width="4"/>
    <text x="190" y="85" fill="#e6fff2" text-anchor="middle" font-family="Arial, sans-serif" font-size="42" font-weight="700">Whoopi Goldberg</text>
  </g>
  <g transform="translate(180 520)">
    <rect width="380" height="140" rx="18" fill="url(#card)" stroke="#7ea0d2" stroke-opacity="0.35"/>
    <text x="190" y="85" fill="#f2f6ff" text-anchor="middle" font-family="Arial, sans-serif" font-size="42" font-weight="700">Tom Hardy</text>
  </g>
  <g transform="translate(610 520)">
    <rect width="380" height="140" rx="18" fill="url(#card)" stroke="#7ea0d2" stroke-opacity="0.35"/>
    <text x="190" y="85" fill="#f2f6ff" text-anchor="middle" font-family="Arial, sans-serif" font-size="42" font-weight="700">Emma Stone</text>
  </g>
  <g transform="translate(1040 520)">
    <rect width="380" height="140" rx="18" fill="url(#card)" stroke="#7ea0d2" stroke-opacity="0.35"/>
    <text x="190" y="85" fill="#f2f6ff" text-anchor="middle" font-family="Arial, sans-serif" font-size="42" font-weight="700">Al Pacino</text>
  </g>
</svg>
